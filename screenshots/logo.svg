<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8892a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="32" fill="url(#bg)"/>

  <!-- Gold accent border -->
  <rect width="240" height="240" rx="32" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>

  <!-- Eye icon (abstract) -->
  <ellipse cx="120" cy="88" rx="38" ry="22" fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="120" cy="88" r="11" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="120" cy="88" r="5" fill="#0d0d0d"/>

  <!-- 87 text -->
  <text x="120" y="158" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="62" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">87</text>

  <!-- VISION text -->
  <text x="120" y="186" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="18" font-weight="600" fill="url(#gold)" text-anchor="middle" letter-spacing="8">VISION</text>

  <!-- Subtle dot accent -->
  <circle cx="56" cy="120" r="3" fill="url(#gold)" opacity="0.3"/>
  <circle cx="184" cy="120" r="3" fill="url(#gold)" opacity="0.3"/>
</svg>
